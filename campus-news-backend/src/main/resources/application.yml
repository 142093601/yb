server:
  port: 8080

spring:
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# MyBatis-Plus
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT
jwt:
  secret: CampusNewsSystem2024SecretKeyForJwtTokenGenerationAndValidation
  expiration: 86400000  # 24小时

# 文件上传路径
file:
  upload-path: ./uploads/
  access-path: /uploads/**

# Knife4j / OpenAPI
knife4j:
  enable: true
  setting:
    language: zh_cn
